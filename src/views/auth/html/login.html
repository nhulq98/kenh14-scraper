<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Kênh14 & Saostar Scraper</title>
    <link rel="stylesheet" href="/auth/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <!-- Logo Section -->
            <div class="login-header">
                <h1>Kênh14 & Saostar</h1>
                <p>Content Scraper + AI</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="login-form">
                <!-- Username Field -->
                <div class="form-group">
                    <label for="username">Tên đăng nhập</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Nhập tên đăng nhập"
                        autocomplete="username"
                        required
                    >
                    <span class="error-message" id="usernameError"></span>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <div class="password-field">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Nhập mật khẩu"
                            autocomplete="current-password"
                            required
                        >
                        <button 
                            type="button" 
                            id="togglePassword" 
                            class="toggle-password"
                            title="Hiển thị/Ẩn mật khẩu"
                        >
                            <span class="icon">👁️</span>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <!-- General Error Message -->
                <div id="errorAlert" class="alert alert-error" style="display: none;"></div>

                <!-- Success Message -->
                <div id="successAlert" class="alert alert-success" style="display: none;"></div>

                <!-- Submit Button -->
                <button type="submit" id="loginBtn" class="btn-login">
                    <span class="btn-text">Đăng Nhập</span>
                    <span class="btn-loader" style="display: none;">
                        <svg class="spinner" viewBox="0 0 50 50">
                            <circle cx="25" cy="25" r="20" fill="none" stroke-width="5"></circle>
                        </svg>
                    </span>
                </button>
            </form>
        </div>

        <!-- Background Animation -->
        <div class="background-animation">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
            <div class="shape shape-3"></div>
        </div>
    </div>

    <!-- Login Script -->
    <script src="/auth/js/login.js"></script>
</body>
</html>
