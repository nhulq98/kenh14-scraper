<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kênh14 Content Scraper</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF4655;
            --secondary: #1a1a2e;
            --accent: #00d4ff;
            --bg-light: #f8f9fa;
            --bg-dark: #0f0f1e;
            --text-primary: #1a1a2e;
            --text-secondary: #666;
            --border: #e0e0e0;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-light) 0%, #f0f4f8 100%);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 20px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border-left: 5px solid var(--primary);
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1.05em;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .input-section,
        .output-section {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
        }

        .input-section:hover,
        .output-section:hover {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
        }

        .section-title {
            font-size: 1.2em;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--primary);
            border-radius: 2px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input[type="url"],
        textarea {
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 1em;
            transition: all 0.3s ease;
            background: var(--bg-light);
        }

        input[type="url"]:focus,
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(255, 70, 85, 0.1);
        }

        input[type="url"] {
            width: 100%;
            padding: 14px 16px;
        }

        textarea {
            width: 100%;
            min-height: 400px;
            resize: vertical;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
            line-height: 1.6;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        textarea:disabled {
            opacity: 0.9;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 15px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #ff6b7f);
            color: white;
            flex: 2;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 70, 85, 0.3);
        }

        .btn-primary:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--bg-light);
            color: var(--text-primary);
            border: 2px solid var(--border);
            flex: 1;
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--border);
            border-color: var(--text-secondary);
        }

        .btn-secondary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status {
            padding: 12px 16px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 0.95em;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid var(--success);
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid var(--error);
        }

        .status.loading {
            background: #dbeafe;
            color: #0c2340;
            border-left: 4px solid var(--accent);
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .info-box {
            background: #f0f9ff;
            border-left: 4px solid var(--accent);
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 0.9em;
            color: #0369a1;
        }

        .info-box strong {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .footer {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9em;
            margin-top: 40px;
            padding: 20px;
        }

        .char-count {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📰 Kênh14 Scraper</h1>
            <p>Lấy nội dung bài viết từ Kênh14.vn một cách nhanh chóng</p>
        </div>

        <div class="main-content">
            <div class="input-section">
                <div class="section-title">URL Input</div>
                <div class="input-group">
                    <input 
                        type="url" 
                        id="urlInput" 
                        placeholder="https://kenh14.vn/..."
                        value=""
                    >
                    <div class="button-group">
                        <button class="btn-primary" id="scrapeBtn">
                            Lấy Nội Dung
                        </button>
                        <button class="btn-secondary" id="clearInput">
                            Xóa
                        </button>
                    </div>
                    <div id="inputStatus" class="status"></div>
                    <div class="info-box">
                        <strong>💡 Hướng dẫn:</strong>
                        Dán URL từ kenh14.vn và nhấn "Lấy Nội Dung". Chương trình sẽ lấy tiêu đề và toàn bộ nội dung bài viết.
                    </div>
                </div>
            </div>

            <div class="output-section">
                <div class="section-title">Output</div>
                <div class="input-group">
                    <textarea 
                        id="outputText" 
                        placeholder="Nội dung bài viết sẽ hiển thị ở đây..."
                        readonly
                    ></textarea>
                    <div class="char-count" id="charCount"></div>
                    <button class="btn-secondary" id="copyBtn">
                        📋 Copy Text
                    </button>
                    <div id="outputStatus" class="status"></div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>🚀 Công cụ scraper Kênh14 | Sử dụng cho mục đích học tập và nghiên cứu</p>
        </div>
    </div>

    <script>
        // DOM Elements
        const urlInput = document.getElementById('urlInput');
        const scrapeBtn = document.getElementById('scrapeBtn');
        const clearInput = document.getElementById('clearInput');
        const outputText = document.getElementById('outputText');
        const copyBtn = document.getElementById('copyBtn');
        const inputStatus = document.getElementById('inputStatus');
        const outputStatus = document.getElementById('outputStatus');
        const charCount = document.getElementById('charCount');

        // Event Listeners
        scrapeBtn.addEventListener('click', scrapeArticle);
        clearInput.addEventListener('click', () => {
            urlInput.value = '';
            outputText.value = '';
            inputStatus.classList.remove('show');
            outputStatus.classList.remove('show');
            charCount.textContent = '';
            urlInput.focus();
        });

        copyBtn.addEventListener('click', copyToClipboard);
        outputText.addEventListener('input', updateCharCount);

        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                scrapeArticle();
            }
        });

        // Main scraping function
        async function scrapeArticle() {
            const url = urlInput.value.trim();

            if (!url) {
                showStatus(inputStatus, 'error', '❌ Vui lòng nhập URL');
                return;
            }

            if (!url.includes('kenh14.vn')) {
                showStatus(inputStatus, 'error', '❌ URL phải từ kenh14.vn');
                return;
            }

            scrapeBtn.disabled = true;
            showStatus(inputStatus, 'loading', '<span class="spinner"></span>Đang lấy dữ liệu...');
            outputText.value = '';

            try {
                const response = await fetch('/api/scrape', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url })
                });

                const data = await response.json();

                if (!data.success) {
                    showStatus(inputStatus, 'error', '❌ ' + data.error);
                    outputText.value = '';
                } else {
                    outputText.value = data.content;
                    showStatus(inputStatus, 'success', '✅ Lấy dữ liệu thành công!');
                    updateCharCount();
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus(inputStatus, 'error', '❌ Lỗi: ' + error.message);
                outputText.value = '';
            } finally {
                scrapeBtn.disabled = false;
            }
        }

        // Show status message
        function showStatus(element, type, message) {
            element.className = `status show ${type}`;
            element.innerHTML = message;
        }

        // Copy to clipboard
        function copyToClipboard() {
            if (!outputText.value) {
                showStatus(outputStatus, 'error', '❌ Không có nội dung để copy');
                return;
            }

            navigator.clipboard.writeText(outputText.value)
                .then(() => {
                    showStatus(outputStatus, 'success', '✅ Đã copy vào clipboard!');
                    setTimeout(() => outputStatus.classList.remove('show'), 2000);
                })
                .catch(err => {
                    showStatus(outputStatus, 'error', '❌ Lỗi khi copy');
                });
        }

        // Update character count
        function updateCharCount() {
            const length = outputText.value.length;
            const words = outputText.value.trim().split(/\s+/).filter(w => w).length;
            charCount.textContent = `📊 ${length} ký tự | ${words} từ`;
        }

        // Focus on input on load
        window.addEventListener('load', () => {
            urlInput.focus();
        });
    </script>
</body>
</html>
